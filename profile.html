<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wePro Company Profile</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Swiper.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --primary-blue: #1e40af;
        }
        body { 
            background-color: #f8fafc; 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        .bg-blur-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.8) 0%, rgba(241, 245, 249, 1) 100%);
            z-index: -1;
        }

        .swiper { 
            width: 100%; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
        }

        .slide-card {
            width: fit-content;
            height: 85vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: transparent;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        .profile-img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        .nav-btn {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            color: var(--primary-blue);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
            z-index: 40;
        }
        .nav-btn:hover { background: var(--primary-blue); color: white; transform: scale(1.1); }
        .nav-btn.swiper-button-disabled { opacity: 0; pointer-events: none; }

        .swiper-pagination {
            bottom: 25px !important;
        }
        .swiper-pagination-bullet { 
            background: #cbd5e1; 
            opacity: 1; 
            width: 8px; 
            height: 8px;
            margin: 0 4px !important;
        }
        .swiper-pagination-bullet-active { 
            background: var(--primary-blue); 
            width: 20px; 
            border-radius: 4px; 
        }

        @media (max-width: 640px) {
            .nav-btn { display: none; }
            .slide-card { 
                height: 80vh;
                width: auto;
                max-width: 95%;
            }
            .download-btn span { display: none; } 
            .download-btn { padding: 8px !important; }
        }
    </style>
</head>
<body>

    <div class="bg-blur-container"></div>

    <!-- Header -->
    <div class="fixed top-0 left-0 w-full p-4 flex justify-between items-center z-50 ">
        <div class="flex items-center space-x-3">
            <a href="./index.html" class="p-2 hover:bg-blue-50 rounded-full transition-colors text-slate-600 hover:text-blue-700 pointer-events-auto" title="Back to Home">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </a>
            
            <div class="w-[1px] h-6 bg-slate-200 mx-1"></div>

            <div class="space-x-2">
                <a href="./index.html" class="flex items-center gap-2">
                    <img src="./assets/img/weprologo.png" class="h-10" alt="">
                </a>
                <div class="flex flex-col block">
                    <span class="text-[9px] text-slate-500 font-medium uppercase tracking-tighter mt-1">Slide <span id="slide-number">1</span> / 48</span>
                </div>
            </div>
        </div>
        
        <a href="./assets/img/profile_slide/wepro_profile_Page_ (1).pdf" 
           download="wePro Company Profile (Private).pdf"
           class="download-btn flex items-center space-x-2 bg-blue-700 hover:bg-blue-800 text-white px-4 py-2 rounded-lg shadow-lg transition-all active:scale-95 group pointer-events-auto">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-y-0.5 transition-transform"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
            <span class="text-xs font-bold uppercase tracking-wide">Download PDF</span>
        </a>
    </div>

    <!-- Swiper -->
    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="slide-container"></div>

        <div class="nav-btn absolute left-4 lg:left-10 top-1/2 -translate-y-1/2 hidden md:flex" id="prev-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </div>
        <div class="nav-btn absolute right-4 lg:right-10 top-1/2 -translate-y-1/2 hidden md:flex" id="next-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </div>

        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        window.onload = function() {
            const container = document.getElementById('slide-container');
            const slideNumDisplay = document.getElementById('slide-number');
            const totalSlides = 43;
            
            // Image Path updated to match "wepro_profile_Page_ (1).jpg"
            const basePath = './assets/img/profile_slide/wepro_profile_Page_ ';

            for (let i = 1; i <= totalSlides; i++) {
                // No leading zero for (1), (2), (3) format
                const imgUrl = `${basePath}(${i}).jpg`;
                
                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                slide.innerHTML = `
                    <div class="slide-card">
                        <img src="${imgUrl}" 
                             class="profile-img" 
                             alt="wePro Page ${i}" 
                             loading="${i <= 2 ? 'eager' : 'lazy'}"
                             onerror="this.onerror=null; this.src='https://placehold.co/800x1200?text=Slide+(${i})'">
                    </div>
                `;
                container.appendChild(slide);
            }

            if (typeof Swiper !== 'undefined') {
                const swiper = new Swiper(".mySwiper", {
                    grabCursor: true,
                    centeredSlides: true,
                    slidesPerView: "auto",
                    spaceBetween: 20,
                    mousewheel: true,
                    keyboard: true,
                    speed: 500,
                    navigation: {
                        nextEl: "#next-btn",
                        prevEl: "#prev-btn",
                    },
                    pagination: {
                        el: ".swiper-pagination",
                        clickable: true,
                        dynamicBullets: true,
                    },
                    on: {
                        slideChange: function () {
                            slideNumDisplay.innerText = this.activeIndex + 1;
                        }
                    }
                });
            }
        };
    </script>
</body>
</html>
